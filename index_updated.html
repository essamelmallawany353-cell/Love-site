<!DOCTYPE html>

<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>For Jessica ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&amp;family=Great+Vibes&amp;display=swap" rel="stylesheet"/>
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: #fff;
        }
        /* قلوب بتطير في الخلفية */
        .hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .heart {
            position: absolute; width: 20px; height: 20px;
            background: #ff6b6b; transform: rotate(45deg);
            animation: float 15s infinite; opacity: 0.6;
        }
        .heart:before, .heart:after {
            content: ''; position: absolute; width: 20px; height: 20px;
            background: #ff6b6b; border-radius: 50%;
        }
        .heart:before { top: -10px; left: 0; }
        .heart:after { top: 0; left: -10px; }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(45deg) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(45deg) scale(1.2); opacity: 0; }
        }
        
        .container { position: relative; z-index: 2; }
        .hidden { display: none !important; }
        
        /* شاشة الباسورد أفخم */
        #login {
            text-align: center; background: rgba(255,255,255,0.08); padding: 60px 50px;
            border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); animation: popIn 1.2s;
        }
        #login h2 { font-size: 2.5rem; margin-bottom: 15px; font-family: 'Great Vibes', cursive; }
        #login input {
            padding: 18px 25px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50px;
            margin: 25px 0; text-align: center; font-size: 18px; outline: none;
            width: 280px; background: rgba(0,0,0,0.3); color: white; transition: 0.3s;
        }
        #login input:focus { border-color: #ff6b6b; box-shadow: 0 0 20px rgba(255,107,107,0.5); }
        #login button {
            padding: 18px 50px; border: none; border-radius: 50px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e, #ff6b6b);
            background-size: 200% 200%; animation: gradientMove 3s ease infinite;
            color: white; font-size: 20px; cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        #login button:hover { transform: scale(1.1); box-shadow: 0 8px 25px rgba(255,107,107,0.6); }
        
        /* الشاشة الرئيسية أفخم */
        #main { text-align: center; }
        #firstMessage {
            font-size: 4rem; font-weight: 900; animation: fadeInDown 2s;
            text-shadow: 0 0 20px rgba(255,107,107,0.8), 3px 3px 15px rgba(0,0,0,0.8);
            font-family: 'Great Vibes', cursive;
        }
        #subMessage { font-size: 1.5rem; margin-top: 20px; opacity: 0; animation: fadeIn 2s 1s forwards; }
        #languages { margin-top: 50px; font-size: 2rem; height: 70px; font-weight: 700; }
        .lang { animation: slideInFade 1s; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        #musicBtn {
            position: fixed; bottom: 30px; right: 30px; background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3); width: 60px; height: 60px; border-radius: 50%;
            font-size: 28px; cursor: pointer; backdrop-filter: blur(10px); z-index: 3; transition: 0.3s;
        }
        #musicBtn:hover { transform: scale(1.15) rotate(10deg); border-color: #ff6b6b; }
        
        @keyframes popIn { from { opacity: 0; transform: scale(0.5) rotateX(90deg); } to { opacity: 1; transform: scale(1) rotateX(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-80px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>
<div class="hearts" id="hearts"></div>
<audio id="bgMusic" loop="">
<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_946f6c9f57.mp3" type="audio/mpeg"/>
</audio>
<button id="musicBtn" onclick="toggleMusic()">▶️</button>
<div class="container">
<div id="login">
<h2>Secret For You</h2>
<p>اكتبي كلمة السر يا قمر 🤍</p>
<input id="passwordInput" placeholder="كلمة السر..." type="password"/>
<br/><button onclick="checkPassword()">افتحي المفاجأة</button>
<p id="error" style="color: #ffb3b3; margin-top: 20px; font-weight: 700;"></p>
</div>
<div class="hidden" id="main">
<div id="firstMessage">بحبك يا جيسيكا</div>
<div id="subMessage">من يوسف... للدنيا كلها ❤️</div>
<div id="languages"></div>
</div>
</div>
<script>
        const PASSWORD = "love";
        const languagesDiv = document.getElementById('languages');
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const loveLanguages = [
"I love you","Je t'aime","Te amo","Ich liebe dich","Ti amo","Eu te amo",
"Я тебя люблю","Seni seviyorum","愛してる","사랑해","我爱你",
"मैं तुमसे प्यार करता हूँ","أحبك","Ik hou van je","Te iubesc",
"Jeg elsker deg","Jag älskar dig","Kocham cię","Σ'αγαπώ","Volim te",
"Mahal kita","Aku cinta kamu","Ngiyakuthanda"
];
        
        // انشاء القلوب الطايرة
        function createHearts() {
            const heartsDiv = document.getElementById('hearts');
            for(let i=0; i<15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 15 + 's';
                heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
                heart.style.transform = `scale(${Math.random() * 0.8 + 0.5}) rotate(45deg)`;
                heartsDiv.appendChild(heart);
            }
        }
        createHearts();

        function checkPassword() {
            if (document.getElementById('passwordInput').value.toLowerCase() === PASSWORD) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('main').classList.remove('hidden');
                startLanguageAnimation();
                music.volume = 0.3;
                music.play().catch(e => { musicBtn.textContent = '▶️'; });
                musicBtn.textContent = '⏸️';
            } else { document.getElementById('error').textContent = "غلط يا قمر 😅 جربي تاني"; }
        }
        
        document.getElementById('passwordInput').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });
        
        function startLanguageAnimation() {
            let i = 0;
            setInterval(() => {
                languagesDiv.innerHTML = `<div class="lang">${loveLanguages[i]}</div>`;
                i = (i + 1) % loveLanguages.length;
            }, 2000);
        }
        
        function toggleMusic() {
            if (music.paused) { music.play(); musicBtn.textContent = '⏸️'; } 
            else { music.pause(); musicBtn.textContent = '▶️'; }
        }
    </script>
</body>
</html>
